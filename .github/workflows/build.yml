name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.detect-forum-changes.outputs.should_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore forum state cache
        id: restore-forum-state
        uses: actions/cache/restore@v5
        with:
          path: .cache/workflow
          key: ${{ runner.os }}-forum-state-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-forum-state-${{ github.ref_name }}-

      - name: Detect forum changes
        id: detect-forum-changes
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .cache/workflow
          curl --fail --silent --show-error --location \
            "https://foro.aldeapucela.org/c/9.json" \
            -o .cache/workflow/current-category.json

          if [ "${{ github.event_name }}" != "schedule" ]; then
            cp .cache/workflow/current-category.json .cache/workflow/last-category.json
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f .cache/workflow/last-category.json ]; then
            cp .cache/workflow/current-category.json .cache/workflow/last-category.json
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          current_hash=$(sha256sum .cache/workflow/current-category.json | awk '{print $1}')
          previous_hash=$(sha256sum .cache/workflow/last-category.json | awk '{print $1}')

          cp .cache/workflow/current-category.json .cache/workflow/last-category.json

          if [ "$current_hash" = "$previous_hash" ]; then
          python3 <<'PY'
          import os
          import json
          import pathlib
          import urllib.error
          import urllib.request

          pending_path = pathlib.Path(".cache/workflow/pending-audio-ids.txt")
          base_url = "https://media.aldeapucela.org/public.php/dav/files/qGB2wj3AjGZSb4E"
          manifest_url = "https://media.aldeapucela.org/public.php/dav/files/qGB2wj3AjGZSb4E/audio-manifest.json"
          should_build = False

          if pending_path.exists():
              pending_ids = [
                  line.strip()
                  for line in pending_path.read_text(encoding="utf-8").splitlines()
                  if line.strip()
              ]

              if pending_ids:
                  try:
                      with urllib.request.urlopen(manifest_url, timeout=10) as response:
                          payload = json.load(response)

                      raw_items = payload if isinstance(payload, list) else (
                          payload.get("items")
                          or payload.get("audios")
                          or [
                              {"id": item_id, **entry}
                              for item_id, entry in (payload.get("itemsById") or {}).items()
                          ]
                      )

                      available_ids = {
                          str(item.get("id") or item.get("articleId") or item.get("topicId") or "").strip()
                          for item in raw_items
                          if isinstance(item, dict) and item.get("isAvailable", True)
                      }

                      should_build = any(article_id in available_ids for article_id in pending_ids)
                  except Exception:
                      for article_id in pending_ids:
                          request = urllib.request.Request(
                              f"{base_url}/{article_id}.mp3",
                              method="HEAD",
                          )

                          try:
                              with urllib.request.urlopen(request, timeout=10) as response:
                                  if 200 <= response.status < 400:
                                      should_build = True
                                      break
                          except urllib.error.HTTPError:
                              continue
                          except Exception:
                              continue

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output_file:
              output_file.write(f"should_build={'true' if should_build else 'false'}\n")
          PY
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"

      - name: Save forum state cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: .cache/workflow
          key: ${{ runner.os }}-forum-state-${{ github.ref_name }}-${{ github.run_id }}

      - name: Setup Node.js
        if: steps.detect-forum-changes.outputs.should_build == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        if: steps.detect-forum-changes.outputs.should_build == 'true'
        uses: actions/configure-pages@v5

      - name: Install dependencies
        if: steps.detect-forum-changes.outputs.should_build == 'true'
        run: npm ci

      - name: Build site
        if: steps.detect-forum-changes.outputs.should_build == 'true'
        env:
          AUDIO_MANIFEST_URL: https://media.aldeapucela.org/public.php/dav/files/qGB2wj3AjGZSb4E/audio-manifest.json
          PODCAST_OWNER_EMAIL: ${{ vars.PODCAST_OWNER_EMAIL || secrets.PODCAST_OWNER_EMAIL }}
          PODCAST_OWNER_NAME: ${{ vars.PODCAST_OWNER_NAME || secrets.PODCAST_OWNER_NAME }}
        run: npm run build

      - name: Refresh pending audio cache
        if: steps.detect-forum-changes.outputs.should_build == 'true'
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .cache/workflow

          node <<'NODE'
            const fs = require("node:fs");
            const path = require("node:path");

            const articlesPath = path.join(process.cwd(), "dist", "api", "articulos.json");
            const outputPath = path.join(process.cwd(), ".cache", "workflow", "pending-audio-ids.txt");
            const payload = JSON.parse(fs.readFileSync(articlesPath, "utf8"));
            const items = Array.isArray(payload?.items) ? payload.items : [];
            const pendingIds = items
              .filter((item) => !item?.audio)
              .map((item) => String(item.id))
              .filter(Boolean);

            fs.writeFileSync(outputPath, `${pendingIds.join("\n")}${pendingIds.length ? "\n" : ""}`, "utf8");
          NODE

      - name: Upload Pages artifact
        if: steps.detect-forum-changes.outputs.should_build == 'true'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy:
    needs: build
    if: needs.build.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
